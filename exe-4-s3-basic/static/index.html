<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xin Chào</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --warm: #f5576c;
            --dark: #1a1a2e;
            --light: #ffffff;
            --glow: rgba(102, 126, 234, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; width: 80px; height: 80px; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; width: 40px; height: 40px; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; width: 60px; height: 60px; }
        .particle:nth-child(4) { left: 40%; animation-delay: 6s; width: 100px; height: 100px; }
        .particle:nth-child(5) { left: 50%; animation-delay: 8s; width: 30px; height: 30px; }
        .particle:nth-child(6) { left: 60%; animation-delay: 10s; width: 70px; height: 70px; }
        .particle:nth-child(7) { left: 70%; animation-delay: 12s; width: 50px; height: 50px; }
        .particle:nth-child(8) { left: 80%; animation-delay: 14s; width: 90px; height: 90px; }
        .particle:nth-child(9) { left: 90%; animation-delay: 16s; width: 25px; height: 25px; }

        @keyframes float {
            0%, 100% { 
                transform: translateY(0) rotate(0deg) scale(1); 
                opacity: 0.7;
            }
            25% { 
                transform: translateY(-100px) rotate(90deg) scale(1.2); 
                opacity: 0.4;
            }
            50% { 
                transform: translateY(-200px) rotate(180deg) scale(0.8); 
                opacity: 0.6;
            }
            75% { 
                transform: translateY(-100px) rotate(270deg) scale(1.1); 
                opacity: 0.5;
            }
        }

        .container {
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 80px 100px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                0 0 100px rgba(255, 255, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            animation: cardFloat 6s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #f093fb, #f5576c, #667eea, #764ba2, #f093fb);
            background-size: 400% 400%;
            border-radius: 32px;
            z-index: -1;
            animation: borderGlow 8s linear infinite;
            opacity: 0.7;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.2; }
        }

        .greeting {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #f093fb 25%, #f5576c 50%, #667eea 75%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 4s linear infinite;
            text-shadow: 0 0 60px rgba(240, 147, 251, 0.5);
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .subtext {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 300;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        .subtext::before,
        .subtext::after {
            content: '✦';
            margin: 0 15px;
            color: #f093fb;
            font-size: 0.9rem;
            animation: sparkle 2s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .decorative-line {
            width: 150px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            margin: 30px auto;
            border-radius: 2px;
            animation: lineGlow 3s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { opacity: 0.5; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.2); }
        }

        .card img {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            animation: imageFloat 5s ease-in-out infinite;
        }

        @keyframes imageFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #f093fb 25%, #f5576c 50%, #667eea 75%, #fff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 4s linear infinite;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .card p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .card {
                padding: 50px 40px;
                margin: 20px;
            }
            .card img {
                max-width: 200px;
            }
            .card h1 {
                font-size: 1.8rem;
            }
            .card p {
                font-size: 1rem;
            }
        }

    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="card">
            <img src="https://blog.cloudmentor.pro/static/images/twitter-card.png" alt="CloudMentorPro">
            <h1>Welcome to CloudMentorPro Blog</h1>
            <p>Its a sample index HTML page of static website sample on AWS S3</p>
        </div>
    </div>
</body>
</html>
