<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không Tìm Thấy</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --warm: #f5576c;
            --dark: #1a1a2e;
            --light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .star:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .star:nth-child(2) { left: 25%; top: 40%; animation-delay: 0.5s; }
        .star:nth-child(3) { left: 40%; top: 15%; animation-delay: 1s; }
        .star:nth-child(4) { left: 55%; top: 60%; animation-delay: 1.5s; }
        .star:nth-child(5) { left: 70%; top: 30%; animation-delay: 2s; }
        .star:nth-child(6) { left: 85%; top: 70%; animation-delay: 2.5s; }
        .star:nth-child(7) { left: 15%; top: 80%; animation-delay: 0.3s; }
        .star:nth-child(8) { left: 60%; top: 85%; animation-delay: 1.2s; }
        .star:nth-child(9) { left: 90%; top: 45%; animation-delay: 0.8s; }
        .star:nth-child(10) { left: 35%; top: 90%; animation-delay: 2.2s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 12rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 25%, #667eea 50%, #764ba2 75%, #f093fb 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s linear infinite;
            text-shadow: 0 0 80px rgba(240, 147, 251, 0.6);
            position: relative;
            display: inline-block;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .error-code::before,
        .error-code::after {
            content: '4';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.3;
            filter: blur(20px);
        }

        .error-code::before {
            transform: translateX(-50%) translateY(10px);
            z-index: -1;
        }

        .error-code::after {
            transform: translateX(-50%) translateY(-10px);
            z-index: -1;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            animation: orbitRotate 20s linear infinite;
        }

        .orbit::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 15px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 50%;
            box-shadow: 0 0 20px #f093fb;
        }

        @keyframes orbitRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .orbit-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid rgba(245, 87, 108, 0.2);
            border-radius: 50%;
            animation: orbitRotate 15s linear infinite reverse;
        }

        .orbit-inner::before {
            content: '';
            position: absolute;
            top: 50%;
            right: -8px;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            box-shadow: 0 0 15px #667eea;
        }

        .message {
            margin-top: 30px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: shapeFloat 15s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            left: 10%;
            top: 10%;
            width: 100px;
            height: 100px;
            border: 3px solid #f093fb;
            border-radius: 50%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            right: 15%;
            bottom: 20%;
            width: 80px;
            height: 80px;
            border: 3px solid #f5576c;
            transform: rotate(45deg);
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            left: 20%;
            bottom: 15%;
            width: 120px;
            height: 120px;
            border: 3px solid #667eea;
            border-radius: 30%;
            animation-delay: 4s;
        }

        @keyframes shapeFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        .decorative-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f093fb, #f5576c, #667eea, transparent);
            margin: 20px auto;
            border-radius: 2px;
            animation: linePulse 2s ease-in-out infinite;
        }

        @keyframes linePulse {
            0%, 100% { opacity: 0.5; transform: scaleX(1); }
            50% { opacity: 1; transform: scaleX(1.3); }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 7rem;
            }
            .orbit {
                width: 280px;
                height: 280px;
            }
            .orbit-inner {
                width: 200px;
                height: 200px;
            }
            .title {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="orbit"></div>
        <div class="orbit-inner"></div>
        
        <div class="error-code">404</div>
        
        <div class="message">
            <div class="decorative-line"></div>
            <h1 class="title">Không Tìm Thấy</h1>
            <p class="subtitle">Trang bạn đang tìm kiếm không tồn tại hoặc đã được di chuyển</p>
            <a href="/" class="btn">Quay Về Trang Chủ</a>
        </div>
    </div>
</body>
</html>
